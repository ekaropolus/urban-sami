version: "0.1"
kind: "polisplexity_matrix_parity"

metadata:
  workflow_id: "polisplexity_state_matrix_parity"
  title: "Polisplexity State Matrix Parity"
  description: "Recompute state-level matrix summary from exported Polisplexity unit tables."
  country_code: "MX"

data_sources:
  summary:
    source_type: "csv_summary"
    path: "../tests/fixtures/polisplexity_golden/state_population_all_cities/summary.csv"
  units_dir:
    source_type: "directory"
    path: "../tests/fixtures/polisplexity_golden/state_population_all_cities/units"

compare:
  numeric_tolerance: 0.000001

outputs:
  base_dir: "../dist"
  write_bundle_zip: true
  write_report_md: false
  write_summary_csv: true
