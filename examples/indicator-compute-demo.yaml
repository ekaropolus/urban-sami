version: "0.1"
kind: "indicator_compute"

metadata:
  workflow_id: "indicator_compute_demo"
  title: "Generic Indicator Compute Demo"
  description: "Compute extracted DENUE indicators on generic domain/unit tables."
  country_code: "MX"

data_sources:
  units:
    source_type: "csv_units"
    path: "../tests/fixtures/indicator_compute/units.csv"
  observations:
    source_type: "csv_observations"
    path: "../tests/fixtures/indicator_compute/observations.csv"

geometry_domains:
  - domain_id: "admin_ageb"
    domain_type: "admin"
    level: "ageb_u"
  - domain_id: "hex_8"
    domain_type: "hex"
    resolution: 8
  - domain_id: "geofence_demo"
    domain_type: "geofence"
    geofence_id: "g1"

indicators:
  - key: "denue_est_count"
    enabled: true
  - key: "denue_est_per_1k_pop"
    enabled: true
  - key: "denue_est_density_km2"
    enabled: true
  - key: "denue_sector_share_46"
    enabled: true
  - key: "denue_revenue_proxy_daily_mxn"
    enabled: true
    params:
      sector_daily_mxn:
        "46": 100.0
        "54": 200.0
        "72": 150.0
        default: 50.0
      size_multiplier:
        micro: 1.0
        small: 2.0
        large: 10.0
        default: 1.0
      default_daily_mxn: 50.0

outputs:
  base_dir: "../dist"
  write_bundle_zip: true
  write_report_md: false
  write_summary_csv: false

