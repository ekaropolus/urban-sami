<svg xmlns="http://www.w3.org/2000/svg" width="1550" height="650" viewBox="0 0 1550 650" role="img"><rect width="1550" height="650" fill="#fbfaf7"/><rect x="18" y="18" width="1514" height="614" rx="8" fill="#ffffff" stroke="#d9d2c4"/><text x="48" y="54" font-size="26" font-family="Georgia, Times, serif" fill="#202124">Phase I workflow as equations</text><text x="48" y="80" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#5f646d">Phase I turns persisted population and DENUE rows into a reproducible catalog of city scaling laws.</text><rect x="48" y="150" width="270" height="245" rx="8" fill="#fbfdff" stroke="#2c6fbb" stroke-width="2"/><text x="66" y="184" font-size="17" font-family="Helvetica" font-weight="700" fill="#202124">1. Persistent inputs</text><text x="66" y="228" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">city i has population N_i</text><text x="66" y="256" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">DENUE row r has city c(r)</text><text x="66" y="284" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">attributes a(r): SCIAN, size, per_ocu</text><line x1="66" y1="337" x2="300" y2="337" stroke="#2c6fbb" stroke-width="1.2" stroke-opacity="0.55"/><text x="66" y="366" font-size="12" font-family="Helvetica" fill="#5f646d">raw.population_units + raw.denue_establishments</text><line x1="326" y1="272.5" x2="340" y2="272.5" stroke="#202124" stroke-width="1.8"/><path d="M 340 272.5 l -8 -5 l 0 10 z" fill="#202124"/><text x="333.0" y="258.5" text-anchor="middle" font-size="11" font-family="Helvetica" fill="#5f646d">aggregate</text><rect x="348" y="150" width="270" height="245" rx="8" fill="#fbfdff" stroke="#1b8a7a" stroke-width="2"/><text x="366" y="184" font-size="17" font-family="Helvetica" font-weight="700" fill="#202124">2. City aggregation</text><text x="366" y="228" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">E_i = sum_{r: c(r)=i} 1</text><text x="366" y="256" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">Y_i^(f,k) = sum_r 1[c(r)=i]</text><text x="366" y="284" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">              * 1[f(r)=k]</text><text x="366" y="312" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">one city table: (N_i, E_i, Y_i^(f,k))</text><line x1="366" y1="337" x2="600" y2="337" stroke="#1b8a7a" stroke-width="1.2" stroke-opacity="0.55"/><text x="366" y="366" font-size="12" font-family="Helvetica" fill="#5f646d">city-level extensive variables</text><line x1="626" y1="272.5" x2="640" y2="272.5" stroke="#202124" stroke-width="1.8"/><path d="M 640 272.5 l -8 -5 l 0 10 z" fill="#202124"/><text x="633.0" y="258.5" text-anchor="middle" font-size="11" font-family="Helvetica" fill="#5f646d">fit</text><rect x="648" y="150" width="270" height="245" rx="8" fill="#fbfdff" stroke="#bb5a3c" stroke-width="2"/><text x="666" y="184" font-size="17" font-family="Helvetica" font-weight="700" fill="#202124">3. Baseline law</text><text x="666" y="228" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">log E_i = alpha + beta log N_i + eps_i</text><text x="666" y="256" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">E_i = exp(alpha) N_i^beta exp(eps_i)</text><text x="666" y="284" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">beta_hat = 0.950, adj. R2 = 0.846</text><line x1="666" y1="337" x2="900" y2="337" stroke="#bb5a3c" stroke-width="1.2" stroke-opacity="0.55"/><text x="666" y="366" font-size="12" font-family="Helvetica" fill="#5f646d">first Bettencourt-style city law</text><line x1="926" y1="272.5" x2="940" y2="272.5" stroke="#202124" stroke-width="1.8"/><path d="M 940 272.5 l -8 -5 l 0 10 z" fill="#202124"/><text x="933.0" y="258.5" text-anchor="middle" font-size="11" font-family="Helvetica" fill="#5f646d">expand</text><rect x="948" y="150" width="270" height="245" rx="8" fill="#fbfdff" stroke="#c7932b" stroke-width="2"/><text x="966" y="184" font-size="17" font-family="Helvetica" font-weight="700" fill="#202124">4. Outcome catalog</text><text x="966" y="228" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">log Y_i^(f,k) = alpha_fk</text><text x="966" y="256" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">                 + beta_fk log N_i</text><text x="966" y="284" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">                 + eps_i^(f,k)</text><text x="966" y="312" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">f: total, size, per_ocu, SCIAN</text><line x1="966" y1="337" x2="1200" y2="337" stroke="#c7932b" stroke-width="1.2" stroke-opacity="0.55"/><text x="966" y="366" font-size="12" font-family="Helvetica" fill="#5f646d">same experiment repeated across outcomes</text><line x1="1226" y1="272.5" x2="1240" y2="272.5" stroke="#202124" stroke-width="1.8"/><path d="M 1240 272.5 l -8 -5 l 0 10 z" fill="#202124"/><text x="1233.0" y="258.5" text-anchor="middle" font-size="11" font-family="Helvetica" fill="#5f646d">curate</text><rect x="1248" y="150" width="270" height="245" rx="8" fill="#fbfdff" stroke="#4f8a46" stroke-width="2"/><text x="1266" y="184" font-size="17" font-family="Helvetica" font-weight="700" fill="#202124">5. Fitability audit</text><text x="1266" y="228" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">A_fk = (n_fk, coverage_fk,</text><text x="1266" y="256" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">       zero_fk, R2_fk)</text><text x="1266" y="284" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">keep if A_fk is interpretable</text><text x="1266" y="312" font-size="14" font-family="Georgia" font-style="italic" fill="#202124">|F_retained| = 71 outcomes</text><line x1="1266" y1="337" x2="1500" y2="337" stroke="#4f8a46" stroke-width="1.2" stroke-opacity="0.55"/><text x="1266" y="366" font-size="12" font-family="Helvetica" fill="#5f646d">separates signal from sparse categories</text><text x="50" y="475" font-size="17" font-family="Helvetica" font-weight="700" fill="#202124">Executable trace</text><rect x="50" y="505" width="300" height="46" rx="23" fill="#fff8ed" stroke="#dec79e"/><text x="68" y="534" font-size="13" font-family="Helvetica" fill="#202124">run_independent_city_baseline.py</text><line x1="357" y1="528" x2="372" y2="528" stroke="#202124" stroke-width="1.4"/><path d="M 372 528 l -6 -4 l 0 8 z" fill="#202124"/><rect x="378" y="505" width="305" height="46" rx="23" fill="#fff8ed" stroke="#dec79e"/><text x="396" y="534" font-size="13" font-family="Helvetica" fill="#202124">run_city_y_fitability_audit.py</text><line x1="690" y1="528" x2="705" y2="528" stroke="#202124" stroke-width="1.4"/><path d="M 705 528 l -6 -4 l 0 8 z" fill="#202124"/><rect x="711" y="505" width="355" height="46" rx="23" fill="#fff8ed" stroke="#dec79e"/><text x="729" y="534" font-size="13" font-family="Helvetica" fill="#202124">run_city_y_curated_results_pack.py</text><line x1="1073" y1="528" x2="1088" y2="528" stroke="#202124" stroke-width="1.4"/><path d="M 1088 528 l -6 -4 l 0 8 z" fill="#202124"/><rect x="1094" y="505" width="300" height="46" rx="23" fill="#fff8ed" stroke="#dec79e"/><text x="1112" y="534" font-size="13" font-family="Helvetica" fill="#202124">run_city_grouped_profiles.py</text><text x="50" y="600" font-size="13" font-family="Helvetica" fill="#5f646d">Interpretation: Phase I begins with one extensive urban quantity, E_i, and then asks whether many DENUE-derived Y_i variables obey comparable population laws.</text></svg>
