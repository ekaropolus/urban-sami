<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img"><rect width="1200" height="560" fill="#fbfaf7"/><rect x="18" y="18" width="1164" height="524" rx="8" fill="#ffffff" stroke="#d9d2c4"/><text x="48" y="54" font-size="26" font-family="Georgia, Times, serif" fill="#202124">Phase I workflow</text><text x="48" y="80" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#5f646d">The baseline branch turns persisted population and DENUE rows into a city-law catalog.</text><rect x="60" y="150" width="190" height="190" rx="8" fill="#fbfdff" stroke="#2c6fbb" stroke-width="2"/><text x="78" y="184" font-size="17" font-family="Helvetica" font-weight="700" fill="#202124">Persistent inputs</text><text x="78" y="222" font-size="13" font-family="Helvetica" fill="#5f646d">raw.population_units</text><text x="78" y="246" font-size="13" font-family="Helvetica" fill="#5f646d">raw.denue_establishments</text><line x1="258" y1="245.0" x2="277" y2="245.0" stroke="#202124" stroke-width="1.8"/><path d="M 277 245.0 l -8 -5 l 0 10 z" fill="#202124"/><rect x="285" y="150" width="190" height="190" rx="8" fill="#fbfdff" stroke="#1b8a7a" stroke-width="2"/><text x="303" y="184" font-size="17" font-family="Helvetica" font-weight="700" fill="#202124">City aggregation</text><text x="303" y="222" font-size="13" font-family="Helvetica" fill="#5f646d">count E_i by city</text><text x="303" y="246" font-size="13" font-family="Helvetica" fill="#5f646d">match N_i from INEGI</text><line x1="483" y1="245.0" x2="502" y2="245.0" stroke="#202124" stroke-width="1.8"/><path d="M 502 245.0 l -8 -5 l 0 10 z" fill="#202124"/><rect x="510" y="150" width="190" height="190" rx="8" fill="#fbfdff" stroke="#bb5a3c" stroke-width="2"/><text x="528" y="184" font-size="17" font-family="Helvetica" font-weight="700" fill="#202124">Baseline law</text><text x="528" y="222" font-size="13" font-family="Helvetica" fill="#5f646d">log E_i = alpha + beta log N_i</text><text x="528" y="246" font-size="13" font-family="Helvetica" fill="#5f646d">beta = 0.950, adj. R² = 0.846</text><line x1="708" y1="245.0" x2="727" y2="245.0" stroke="#202124" stroke-width="1.8"/><path d="M 727 245.0 l -8 -5 l 0 10 z" fill="#202124"/><rect x="735" y="150" width="190" height="190" rx="8" fill="#fbfdff" stroke="#c7932b" stroke-width="2"/><text x="753" y="184" font-size="17" font-family="Helvetica" font-weight="700" fill="#202124">Outcome catalog</text><text x="753" y="222" font-size="13" font-family="Helvetica" fill="#5f646d">fit Y_i^(f,c) for DENUE families</text><text x="753" y="246" font-size="13" font-family="Helvetica" fill="#5f646d">per_ocu, size_class, SCIAN2, SCIAN3</text><line x1="933" y1="245.0" x2="952" y2="245.0" stroke="#202124" stroke-width="1.8"/><path d="M 952 245.0 l -8 -5 l 0 10 z" fill="#202124"/><rect x="960" y="150" width="190" height="190" rx="8" fill="#fbfdff" stroke="#4f8a46" stroke-width="2"/><text x="978" y="184" font-size="17" font-family="Helvetica" font-weight="700" fill="#202124">Fitability audit</text><text x="978" y="222" font-size="13" font-family="Helvetica" fill="#5f646d">coverage + zero rate + R²</text><text x="978" y="246" font-size="13" font-family="Helvetica" fill="#5f646d">retain 71 interpretable outcomes</text><text x="60" y="430" font-size="14" font-family="Helvetica" fill="#202124">Scripts: run_independent_city_baseline.py -> run_city_y_fitability_audit.py -> run_city_y_curated_results_pack.py -> run_city_grouped_profiles.py</text></svg>
